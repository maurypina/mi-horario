name: Compilar APK
on: {push: {branches: [main]}, workflow_dispatch: null}
permissions: {contents: write}
jobs: {build: {runs-on: ubuntu-latest, steps: [{uses: "actions/checkout@v4"}, {uses: "actions/setup-java@v4", with: {distribution: "temurin", java-version: "17"}}, {name: "Compilar APK", run: "unzip -o MiHorario.zip -d . && cd MiHorario && chmod +x gradlew && ./gradlew assembleDebug --stacktrace"}, {uses: "actions/upload-artifact@v4", with: {name: "MiHorario-debug-apk", path: "MiHorario/app/build/outputs/apk/debug/app-debug.apk"}}, {uses: "softprops/action-gh-release@v2", with: {tag_name: "build-latest", name: "Mi Horario build automatico", files: "MiHorario/app/build/outputs/apk/debug/app-debug.apk", make_latest: true}, continue-on-error: true}]}}
